<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiteSpot Logo Preview</title>
<style>
  body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 48px 24px; font-family: sans-serif; }
  h2 { color: #7da8c4; font-size: 13px; letter-spacing: .12em; text-transform: uppercase; margin: 0 0 12px; text-align: center; }
  img { display: block; border-radius: 12px; }
  .section { display: flex; flex-direction: column; align-items: center; }
  .circle { border-radius: 50%; overflow: hidden; }
</style>
</head>
<body>
  <div class="section">
    <h2>Feed Post / Story Logo — 1080×1080</h2>
    <img src="logo-instagram.svg" width="540" height="540"/>
  </div>
  <div class="section">
    <h2>Profile Picture — icon only (shown in circle crop)</h2>
    <img src="logo-ig-profile.svg" width="300" height="300" class="circle"/>
  </div>
</body>
</html>
