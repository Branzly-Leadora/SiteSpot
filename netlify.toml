[build]
  publish = "."
  command = "echo 'Static site — no build needed'"

[[redirects]]
  from = "/index.html"
  to = "/websites/"
  status = 301

[[redirects]]
  from = "/automatizace.html"
  to = "/websites/automatizace.html"
  status = 301

[[redirects]]
  from = "/templates.html"
  to = "/websites/templates.html"
  status = 301

[[redirects]]
  from = "/a"
  to = "/a.html"
  status = 200

[[redirects]]
  from = "/telemarkclub"
  to = "/telemarkclub.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
