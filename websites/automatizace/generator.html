<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI generátor — ukázka SiteSpot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="demo.css" />
  <style>
    .split { flex: 1; min-height: 0; display: grid; grid-template-columns: 0.85fr 1.15fr; gap: 1.1rem; }
    @media (max-width: 640px) { .split { grid-template-columns: 1fr; overflow: auto; } }
    .pane { display: flex; flex-direction: column; min-height: 0; }
    .pane__h { font-size: 0.64rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-2); margin-bottom: 0.55rem; }
    .form { display: flex; flex-direction: column; gap: 0.7rem; }
    .field label { display: block; font-size: 0.68rem; color: var(--gray-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
    .field input, .field select, .field textarea {
      width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border-2); border-radius: 8px;
      padding: 0.6rem 0.8rem; color: var(--white); font-family: var(--font); font-size: 0.85rem; outline: none;
    }
    .field textarea { resize: none; min-height: 80px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .out { flex: 1; overflow: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-2); padding: 1rem 1.1rem; font-size: 0.86rem; line-height: 1.65; white-space: pre-wrap; }
    .out .ph { color: var(--gray-2); }
    .docchip { display: inline-flex; align-items: center; gap: 0.4rem; margin-bottom: 0.7rem; }

    /* recording mode */
    .rec { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); padding: 1rem; }
    .wave { display: flex; align-items: flex-end; gap: 3px; height: 46px; margin: 0.7rem 0; }
    .wave i { flex: 1; background: var(--accent); opacity: 0.5; border-radius: 2px; animation: wv 1.1s ease-in-out infinite; }
    @keyframes wv { 0%,100% { height: 18%; } 50% { height: 100%; } }
    .tasklist { list-style: none; margin-top: 0.6rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .tasklist li { display: flex; gap: 0.6rem; align-items: flex-start; font-size: 0.85rem; }
    .tasklist .box { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--accent); flex-shrink: 0; margin-top: 0.15rem; color: var(--accent); font-size: 0.7rem; text-align: center; line-height: 15px; }
    .controls { display: flex; gap: 0.7rem; padding-top: 0.9rem; }
  </style>
</head>
<body>
  <div class="demo">
    <div class="demo__bar">
      <span class="demo__dots"><i></i><i></i><i></i></span>
      <span class="demo__title" id="title">AI generátor</span>
      <span class="demo__live"><i></i> Ukázka</span>
    </div>
    <div class="demo__body" id="root"></div>
  </div>

  <script>
  (function () {
    'use strict';
    const params = new URLSearchParams(location.search);
    const scene = params.get('scene') || 'nabidka';
    const root = document.getElementById('root');
    const titleEl = document.getElementById('title');

    const FORM = {
      nabidka: {
        title: 'AI generátor nabídek',
        fields: [
          { l: 'Klient', t: 'input', v: 'Restaurace U Kotvy' },
          { l: 'Rozsah', t: 'select', opts: ['Web s rezervací', 'Jen prezentační web', 'Web + e-shop'] },
          { l: 'Termín', t: 'input', v: 'do 6 týdnů' },
        ],
        btn: 'Vygenerovat nabídku',
        out: 'CENOVÁ NABÍDKA — SiteSpot\nPro: Restaurace U Kotvy\n\nNavrhujeme moderní web s online rezervací stolů, digitálním menu a galerií. Plně responzivní, SEO-ready, napojení na rezervační systém.\n\nRozsah prací:\n• UX/UI návrh a grafika ......... 14 000 Kč\n• Vývoj webu (5 stran) .......... 28 000 Kč\n• Online rezervace + menu ....... 16 000 Kč\n• SEO základ + spuštění ......... 6 000 Kč\n\nCelkem: 64 000 Kč bez DPH\nTermín dodání: do 6 týdnů od schválení\nPlatnost nabídky: 30 dní\n\nTěšíme se na spolupráci!',
        chip: '📄 nabidka-u-kotvy.pdf',
      },
      obsah: {
        title: 'AI generování obsahu',
        fields: [
          { l: 'Produkt', t: 'input', v: 'Ručně pražená káva 1 kg' },
          { l: 'Tón', t: 'select', opts: ['Přátelský', 'Prémiový', 'Hravý'] },
          { l: 'Kanál', t: 'select', opts: ['Produktový popis', 'Instagram post', 'Newsletter'] },
        ],
        btn: 'Vygenerovat obsah',
        out: 'Ručně pražená káva, která vás ráno nenechá na holičkách ☕\n\nVybíráme zrna od malých farem a pražíme je po malých dávkách, aby si každý šálek držel svou plnou chuť — čokoláda, oříšek, jemná ovocná kyselinka. 1 kg vydrží i náročnému kávovému nadšenci.\n\n• 100 % Arabica\n• Praženo tento týden\n• Doprava zdarma nad 800 Kč\n\n#káva #čerstvěpraženo #rannírituál',
        chip: '✓ 3 varianty připraveny',
      },
      preklad: {
        title: 'AI překlady a lokalizace',
        fields: [
          { l: 'Zdrojový text (CZ)', t: 'textarea', v: 'Vítejte v naší restauraci. Vaříme z čerstvých lokálních surovin a každé jídlo připravujeme s láskou.' },
          { l: 'Cílový jazyk', t: 'select', opts: ['Angličtina', 'Němčina', 'Polština'] },
        ],
        btn: 'Přeložit & lokalizovat',
        out: 'Welcome to our restaurant. We cook with fresh, locally sourced ingredients and prepare every dish with care.\n\n— lokalizováno s ohledem na kontext a tón, ne strojově. Připraveno k publikaci na webu.',
        chip: '🌍 EN · připraveno',
      },
    };

    const REC = {
      schuzka: {
        title: 'Shrnutí schůzky',
        label: 'Nahrávka schůzky · 32:14',
        btn: 'Přepsat & shrnout',
        summary: 'SHRNUTÍ SCHŮZKY — Projekt web ACME (24. 6. 2026)\n\nÚčastníci: Max (SiteSpot), Jana (ACME)\n\nKlíčové body:\n• Klient chce spustit web do konce srpna\n• Preferuje tmavý design, důraz na reference\n• Rozpočet potvrzen do 80 tis. Kč\n• Texty dodá klient do 2 týdnů',
        tasks: ['Poslat návrh harmonogramu — Max, do pátku', 'Připravit moodboard tmavého designu — Max, do středy', 'Dodat texty a fotky — Jana, do 8. 7.', 'Naplánovat follow-up call — Max, příští týden'],
      },
      hovor: {
        title: 'Záznam z hovoru',
        label: 'Příchozí hovor · 06:48',
        btn: 'Přepsat & vytěžit',
        summary: 'ZÁZNAM HOVORU — Jan Novák (potenciální klient)\n\n• Zájem o web pro řemeslnou dílnu\n• Aktuálně web nemá, jen Facebook\n• Chce hlavně galerii prací a poptávkový formulář\n• Rozpočet zatím neřešil, čeká nabídku',
        tasks: ['Vytvořit kontakt v CRM — automaticky ✓', 'Poslat orientační nabídku — do zítřka', 'Zařadit do follow-up sekvence — automaticky ✓'],
      },
    };

    const now = () => { const d = new Date(); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); };

    function typeOut(el, text, done) {
      let i = 0;
      (function t() { el.textContent = text.slice(0, i); if (i < text.length) { i += 4; setTimeout(t, 10); } else if (done) done(); })();
    }

    if (FORM[scene]) {
      const cfg = FORM[scene];
      titleEl.textContent = cfg.title; document.title = cfg.title;
      const split = document.createElement('div'); split.className = 'split';
      const fields = cfg.fields.map(f => {
        if (f.t === 'select') return '<div class="field"><label>' + f.l + '</label><select>' + f.opts.map(o => '<option>' + o + '</option>').join('') + '</select></div>';
        if (f.t === 'textarea') return '<div class="field"><label>' + f.l + '</label><textarea>' + f.v + '</textarea></div>';
        return '<div class="field"><label>' + f.l + '</label><input value="' + (f.v || '') + '" /></div>';
      }).join('');
      split.innerHTML =
        '<div class="pane"><div class="pane__h">Parametry</div><div class="form">' + fields +
          '<div class="controls"><button class="btn" id="gen">' + cfg.btn + '</button></div></div></div>' +
        '<div class="pane"><div class="pane__h">Výstup</div><div class="out" id="out"><span class="ph">Vyplňte parametry vlevo a klikněte na „' + cfg.btn + '".</span></div></div>';
      root.appendChild(split);
      const out = split.querySelector('#out');
      const gen = split.querySelector('#gen');
      function generate() {
        gen.disabled = true; gen.textContent = 'Generuji…';
        out.innerHTML = '';
        setTimeout(() => {
          if (cfg.chip) { const c = document.createElement('div'); c.className = 'chip chip--ok docchip'; c.textContent = cfg.chip; out.appendChild(c); out.appendChild(document.createElement('br')); }
          const span = document.createElement('span'); out.appendChild(span);
          typeOut(span, cfg.out, () => { gen.disabled = false; gen.textContent = cfg.btn; });
        }, 600);
      }
      gen.addEventListener('click', generate);
      setTimeout(generate, 600);

    } else {
      const cfg = REC[scene] || REC.schuzka;
      titleEl.textContent = cfg.title; document.title = cfg.title;
      root.innerHTML =
        '<div class="rec"><div class="chip">🎙️ ' + cfg.label + '</div>' +
        '<div class="wave">' + Array.from({length:32}, (_,i)=>'<i style="animation-delay:'+(i*0.05)+'s"></i>').join('') + '</div>' +
        '<button class="btn" id="go">' + cfg.btn + '</button></div>' +
        '<div class="out" id="out" style="margin-top:1rem"><span class="ph">Klikněte na „' + cfg.btn + '" — z nahrávky vznikne zápis a úkoly.</span></div>';
      const out = root.querySelector('#out');
      const go = root.querySelector('#go');
      function process() {
        go.disabled = true; go.textContent = 'Přepisuji…';
        out.innerHTML = '<span class="muted">Přepis & analýza…</span>';
        setTimeout(() => {
          out.innerHTML = '';
          const sum = document.createElement('div'); out.appendChild(sum);
          typeOut(sum, cfg.summary, () => {
            const h = document.createElement('div'); h.style.cssText = 'margin:0.9rem 0 0.3rem;font-weight:700;color:var(--accent-2)'; h.textContent = '✓ Úkoly';
            out.appendChild(h);
            const ul = document.createElement('ul'); ul.className = 'tasklist'; out.appendChild(ul);
            cfg.tasks.forEach((t, i) => setTimeout(() => {
              const li = document.createElement('li'); li.className = 'in';
              li.innerHTML = '<span class="box">✓</span><span>' + t + '</span>'; ul.appendChild(li);
            }, i * 300));
            go.disabled = false; go.textContent = cfg.btn;
          });
        }, 1100);
      }
      go.addEventListener('click', process);
      setTimeout(process, 700);
    }
  })();
  </script>
</body>
</html>
